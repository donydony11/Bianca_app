<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>For You, Bianca</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta
    name="description"
    content="A little romantic invitation for Bianca."
  />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@400;500&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="background">
    <div class="heart heart--one"></div>
    <div class="heart heart--two"></div>
    <div class="heart heart--three"></div>
  </div>

  <main class="page">
    <section class="card">
      <header class="card__header">
        <p class="card__overtitle">A little note just for</p>
        <h1 class="card__title">Bianca❤️</h1>
      </header>

      <section id="message" class="card__body">
        <!-- Lines will be typed here by script.js -->
      </section>

      <footer class="card__footer">
        <p class="card__signature">
          Din toată inima,<br />
          <span class="card__signature--accent">Al tău,</span><br>
          <span class="card__signature--accent"> Denis </span>
        </p>
      </footer>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
